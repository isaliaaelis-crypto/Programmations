<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet"type="text/css"href="formulaire.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription✍🏼</title>
</head>
<body>
  <form action="https://formsubmit.co/dayanehilary3@gmail.com"method="POST">
    <h1> Formulaire d'inscription✍🏼</h1>
    <label for="nom">
      Nom:
    </label>
    <input type="text"id="nom" required/>
    <br><br>
    <label for="prenom">
      Prénom:
    </label>
    <input type="text"id="prenom" required/>
    <br><br>
    <label for="date">
      Date de naissance:
      <input type="date"id="date" required/>
      <br><br>
      <label for="lieu">
        Lieu de naissance:
      </label>
      <input type="text"id="lieu" required/>
      <br><br>
      <label for="email">
        E-mail:
      </label>
      <input type="email"id="email" required/>
    <br><br>
    <label for="telephone">
      Téléphone:
    </label>
    <input type="number"id="telephone" required/>
    <br><br>
    <label for="ville">
      Ville de résidence:
    </label>
    <select id="ville">
      <option> Yaoundé </option>
      <option> Douala </option>
      <option> Ngaroundéré</option>
      <option> Adamaoua </option>
      <option> Garoua </option>
      <option> Bafoussam </option>
      <option> Edéa </option>
      <option> Buéa </option>
      <option> Batoufam </option>
      <option> Dschang </option>
      <option> Maroua </option>
      <option> Ebolowa </option>
      <option> Bandjoun </option>
      <option> Penka Michel </option>
    </select>
    <br><br>
    <label> Sexe: </label>
    <input type="radio"id="homme" name="sexe" value="homme">
    <label for="homme">
      Homme
    </label>
    <input type="radio"id="femme" name="sexe" value="femme">
    <label for="femme">
      Femme 
    </label>
    <br><br>
    <label for="message">
      Message
    </label>
    <br><br>
    <textarea id="message" rows="5" cols="30">
    </textarea>
    <br><br>
    <input type="checkbox"id="condition">
    <label for="condition">
      J'accepte les conditions d'utilisation 
    </label>
    <br><br>
    <input type="submit"value="Envoyer">
    <input type="reset"value="Annuler">
  </form>
</body>
</html>
